name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 1. Build the portfolio (Next.js static export) -> ./out
      - run: npm ci
      - run: npm run build

      # 2. Build homebase-v2 -> ./out/homebase
      - name: Build homebase
        run: |
          git clone --depth 1 https://github.com/jonginevro/homebase-v2.git "$RUNNER_TEMP/homebase"
          cd "$RUNNER_TEMP/homebase"
          npm ci
          npm run build   # base is '/homebase/' in vite.config.js
          mkdir -p "$GITHUB_WORKSPACE/out/homebase"
          cp -r dist/. "$GITHUB_WORKSPACE/out/homebase/"

      # 3. Drop in the nba static site -> ./out/momentum
      - name: Add nba-momentum-charts
        run: |
          git clone --depth 1 https://github.com/jonginevro/nba-momentum-charts.git "$RUNNER_TEMP/nba"
          mkdir -p "$GITHUB_WORKSPACE/out/momentum"
          cp -r "$RUNNER_TEMP/nba/docs/." "$GITHUB_WORKSPACE/out/momentum/"

      # 4. breakout-board is a live Streamlit app
      - name: Add breakout-board redirect
        env:
          BREAKOUT_URL: https://breakout-board.streamlit.app
        run: |
          mkdir -p "$GITHUB_WORKSPACE/out/breakout-board"
          cat > "$GITHUB_WORKSPACE/out/breakout-board/index.html" <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <title>Fantasy Breakout Board — redirecting…</title>
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <link rel="canonical" href="${BREAKOUT_URL}" />
            <meta http-equiv="refresh" content="0; url=${BREAKOUT_URL}" />
            <script>window.location.replace("${BREAKOUT_URL}");</script>
          </head>
          <body style="font-family:system-ui,sans-serif;padding:2rem">
            Redirecting to the Fantasy Breakout Board…
            <a href="${BREAKOUT_URL}">Continue</a>
          </body>
          </html>
          EOF

      # 5. Publish the combined output
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          cname: jonginevro.com
